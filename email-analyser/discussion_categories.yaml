      - abandoned

  - name: support-issue
    description: "Technical support or customer service issue"

    event_types:
      - name: issue_reported
        description: "Issue or problem reported"
      - name: acknowledged
        description: "Issue acknowledged by support team"
      - name: info_requested
        description: "Additional information requested from reporter"
      - name: info_provided
        description: "Additional information provided"
      - name: investigation_started
        description: "Investigation or debugging started"
      - name: root_cause_found
        description: "Root cause identified"
      - name: fix_proposed
        description: "Fix or workaround proposed"
      - name: fix_applied
        description: "Fix applied or deployed"
      - name: issue_resolved
        description: "Issue confirmed resolved"
      - name: issue_escalated
        description: "Issue escalated to higher tier or management"

    milestones:
      - name: acknowledged
        description: "Issue acknowledged and assigned"
      - name: under_investigation
        description: "Active investigation underway"
      - name: root_cause_identified
        description: "Root cause found"
      - name: fix_in_progress
        description: "Fix being developed or applied"
      - name: resolved
        description: "Issue resolved and confirmed"

    workflow_states:
