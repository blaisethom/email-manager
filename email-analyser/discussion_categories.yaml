  - name: board-discussion
    description: "Board discussion with current members or investors"

    event_types:
      - name: agenda_shared
        description: "Board meeting agenda shared"
      - name: board_pack_sent
        description: "Board pack or materials distributed"
      - name: meeting_held
        description: "Board meeting took place"
      - name: minutes_shared
        description: "Board meeting minutes distributed"
      - name: resolution_proposed
        description: "Board resolution proposed"
      - name: resolution_approved
        description: "Board resolution approved"
      - name: action_assigned
        description: "Action item assigned to board member or exec"
      - name: update_provided
        description: "Progress update provided on board action"
      - name: follow_up_scheduled
        description: "Follow-up meeting or discussion scheduled"

    milestones:
      - name: materials_distributed
        description: "Board pack and agenda sent to all members"
      - name: meeting_completed
        description: "Board meeting held"
      - name: minutes_circulated
        description: "Minutes distributed and acknowledged"
      - name: resolutions_approved
        description: "All proposed resolutions approved"
      - name: actions_complete
        description: "All board actions completed"

    workflow_states:
      - active
      - resolved
      - stalled
    terminal_states:
      - resolved
      - stalled

  - name: newsletter
    description: "Newsletter or information updates"

    event_types:
      - name: newsletter_received
        description: "Newsletter or update received"
      - name: content_reviewed
        description: "Newsletter content reviewed or noted"
      - name: action_taken
        description: "Action taken based on newsletter content"
      - name: unsubscribed
        description: "Unsubscribed from newsletter"

    milestones:
      - name: received
        description: "Newsletter received and noted"
      - name: actioned
        description: "Relevant action taken from newsletter content"

    workflow_states:
      - active
      - resolved
    terminal_states:
      - resolved

  - name: other
    description: "Discussion that does not fit any other category"

    event_types:
      - name: conversation_started
        description: "Initial message or outreach"
      - name: response_received
        description: "Response received from other party"
      - name: info_shared
        description: "Information or documents shared"
      - name: meeting_held
        description: "Meeting or call took place"
      - name: action_taken
        description: "Action taken or task completed"
      - name: follow_up_needed
        description: "Follow-up identified as needed"
      - name: resolved
        description: "Matter resolved or concluded"

    milestones:
      - name: engaged
        description: "Active back-and-forth established"
      - name: resolved
        description: "Matter resolved"
      - name: stalled
        description: "Discussion stalled with no recent activity"

    workflow_states:
      - active
      - resolved
      - stalled
    terminal_states:
